name: Docs - Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      TT_METAL_HOME: ${{ github.workspace }}
      DOC_SITE_BASE_URL: https://firdovsimammedovk.github.io/tt-metal-sandbox
      DOCS_VERSION: latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore docs virtualenv cache
        id: cache-docs-venv
        uses: actions/cache@v4
        with:
          path: .ci-docs-venv
          key: ${{ runner.os }}-docs-venv-py311-${{ hashFiles('docs/requirements-docs.txt', 'setup.py', 'pyproject.toml') }}

      - name: Restore C++ build cache
        id: cache-build
        uses: actions/cache@v4
        with:
          path: |
            build
            build_Release
          key: ${{ runner.os }}-docs-build-${{ hashFiles('build_metal.sh', 'CMakeLists.txt', 'cmake/**/*.cmake', 'tt_metal/CMakeLists.txt', 'ttnn/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-docs-build-

      - name: Create and activate docs virtualenv
        run: |
          python3 -m venv .ci-docs-venv
          echo "VIRTUAL_ENV=${{ github.workspace }}/.ci-docs-venv" >> "$GITHUB_ENV"
          echo "${{ github.workspace }}/.ci-docs-venv/bin" >> "$GITHUB_PATH"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y doxygen graphviz ninja-build rsync clang lld \
            libnuma-dev libhwloc-dev libopenmpi-dev openmpi-bin pandoc
          sudo ln -sf "$(command -v clang)" /usr/local/bin/clang-20 2>/dev/null || true
          sudo ln -sf "$(command -v clang++)" /usr/local/bin/clang++-20 2>/dev/null || true

      - name: Install docs Python requirements
        run: |
          pip install --upgrade pip
          pip install -r docs/requirements-docs.txt

      - name: Check if ttnn backend already importable
        id: check-ttnn
        run: |
          if python -c "import ttnn._ttnn" 2>/dev/null; then
            echo "ttnn_ready=true" >> "$GITHUB_OUTPUT"
            echo "ttnn._ttnn already available"
          else
            echo "ttnn_ready=false" >> "$GITHUB_OUTPUT"
            echo "ttnn._ttnn not yet available — will build"
          fi

      - name: Build native prerequisites (best effort)
        if: steps.cache-build.outputs.cache-hit != 'true' && steps.check-ttnn.outputs.ttnn_ready != 'true'
        run: |
          pip install --upgrade pip setuptools wheel setuptools-scm
          set +e
          if [[ -x ./build_metal.sh ]]; then
            chmod +x ./build_metal.sh
            ./build_metal.sh --disable-profiler
          else
            cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX=build -DENABLE_TRACY=OFF
            cmake --build build
            cmake --install build
          fi
          build_exit=$?
          set -e
          echo "Native build exit code: $build_exit"

      - name: Install SFPI toolchain (best effort)
        if: steps.check-ttnn.outputs.ttnn_ready != 'true'
        run: |
          if [[ ! -x "/opt/tenstorrent/sfpi/compiler/bin/riscv-tt-elf-g++" ]]; then
            chmod +x ./install_dependencies.sh
            sudo ./install_dependencies.sh --sfpi || echo "::warning::SFPI install failed — continuing"
          else
            echo "SFPI already present"
          fi

      - name: Install ttnn Python package (best effort)
        if: steps.check-ttnn.outputs.ttnn_ready != 'true'
        run: |
          pip install --upgrade pip setuptools wheel setuptools-scm
          set +e
          if [[ -f "build/lib/_ttnn.so" && -d "build/lib" && -d "runtime" ]]; then
            echo "Installing from precompiled artifacts..."
            TT_FROM_PRECOMPILED_DIR="${GITHUB_WORKSPACE}" pip install --force-reinstall .
          else
            echo "Building ttnn wheel via CMake..."
            CIBUILDWHEEL=1 CIBW_BUILD_TYPE=Release pip install --force-reinstall .
          fi
          pip_exit=$?
          set -e
          if [ "$pip_exit" -ne 0 ]; then
            echo "::warning::pip install . failed (exit $pip_exit) — trying PyPI wheel"
            pip install "ttnn==0.71.2" || echo "::warning::PyPI ttnn install also failed"
          fi

      - name: Verify ttnn availability (informational)
        run: |
          if python -c "import ttnn._ttnn; print('ttnn._ttnn OK:', ttnn.__version__ if hasattr(ttnn, '__version__') else 'version unknown')" 2>&1; then
            echo "Real ttnn available — API docs will have full signatures"
          else
            echo "::warning::ttnn._ttnn not importable — API docs will use mock stubs"
          fi

      - name: Build Doxygen XML
        run: doxygen docs/Doxyfile || echo "::warning::Doxygen failed — C++ API pages skipped"

      - name: Build TT-Metalium docs
        run: |
          mkdir -p docs/build
          DOCS_VERSION=latest REQUESTED_DOCS_PKG=tt-metalium \
            sphinx-build docs/source/tt-metalium docs/build/html/tt-metalium \
            --keep-going || true

      - name: Build TT-NN docs
        run: |
          DOCS_VERSION=latest REQUESTED_DOCS_PKG=ttnn \
            sphinx-build docs/source/ttnn docs/build/html/ttnn \
            --keep-going || true

      - name: Copy root index
        run: cp docs/source/index.html docs/build/html/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build/html

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
