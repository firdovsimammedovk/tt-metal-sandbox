name: Docs - Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      TT_METAL_HOME: ${{ github.workspace }}
      DOC_SITE_BASE_URL: https://firdovsimammedovk.github.io/tt-metal-sandbox
      DOCS_VERSION: latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Restore C++ build cache
        id: cache-build
        uses: actions/cache@v4
        with:
          path: |
            build
            build_Release
          key: ${{ runner.os }}-docs-build-py310-${{ hashFiles('build_metal.sh', 'CMakeLists.txt', 'cmake/**/*.cmake', 'tt_metal/CMakeLists.txt', 'ttnn/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-docs-build-py310-
            ${{ runner.os }}-docs-build-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y doxygen pandoc

      - name: Install docs requirements
        run: |
          pip install --upgrade pip
          pip install -r docs/requirements-docs.txt

      - name: Install ttnn from PyPI (cp310 wheel)
        run: |
          pip install ttnn && echo "ttnn installed from PyPI" || echo "::warning::PyPI ttnn install failed"

      - name: Verify ttnn import
        id: check-ttnn
        run: |
          echo "=== ttnn diagnostics ==="
          python -c "import ttnn; print('ttnn file:', ttnn.__file__)" 2>&1 || echo "import ttnn FAILED"
          python -c "import ttnn._ttnn; print('_ttnn OK')" 2>&1 || echo "_ttnn FAILED"
          python -c "import ttnn.experimental; print('ttnn.experimental OK')" 2>&1 || echo "ttnn.experimental FAILED"
          python -c "import ttnn; print('open_device:', hasattr(ttnn, 'open_device'))" 2>&1 || true
          # Check if experimental submodule works (needed for autosummary)
          if python -c "import ttnn.experimental" 2>/dev/null; then
            echo "ttnn_ok=true" >> "$GITHUB_OUTPUT"
            echo "ttnn fully importable including experimental"
          else
            echo "ttnn_ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::ttnn.experimental not importable — docs will use mock stubs"
          fi

      - name: Build from source if PyPI import failed
        if: steps.check-ttnn.outputs.ttnn_ok != 'true' && steps.cache-build.outputs.cache-hit != 'true'
        run: |
          pip install --upgrade setuptools wheel setuptools-scm
          sudo apt-get install -y ninja-build clang lld libnuma-dev libhwloc-dev libopenmpi-dev openmpi-bin graphviz rsync
          sudo ln -sf "$(command -v clang)" /usr/local/bin/clang-20 2>/dev/null || true
          sudo ln -sf "$(command -v clang++)" /usr/local/bin/clang++-20 2>/dev/null || true
          if [[ ! -x "/opt/tenstorrent/sfpi/compiler/bin/riscv-tt-elf-g++" ]]; then
            chmod +x ./install_dependencies.sh
            sudo ./install_dependencies.sh --sfpi || echo "::warning::SFPI install failed"
          fi
          set +e
          chmod +x ./build_metal.sh && ./build_metal.sh --disable-profiler
          build_exit=$?
          set -e
          echo "build_metal exit: $build_exit"
          if [[ -f "build/lib/_ttnn.so" && -d "build/lib" && -d "runtime" ]]; then
            TT_FROM_PRECOMPILED_DIR="${GITHUB_WORKSPACE}" pip install --force-reinstall . || \
              CIBUILDWHEEL=1 CIBW_BUILD_TYPE=Release pip install --force-reinstall . || \
              echo "::warning::pip install . failed"
          else
            CIBUILDWHEEL=1 CIBW_BUILD_TYPE=Release pip install --force-reinstall . || \
              echo "::warning::CMake wheel build failed"
          fi

      - name: Final ttnn check
        run: |
          python -c "import ttnn._ttnn; print('ttnn._ttnn final check: OK')" 2>&1 || \
            echo "::warning::ttnn._ttnn still not importable — docs will use mock stubs"

      - name: Build Doxygen XML
        run: doxygen docs/Doxyfile || echo "::warning::Doxygen failed — C++ API pages skipped"

      - name: Build TT-Metalium docs
        run: |
          mkdir -p docs/build
          DOCS_VERSION=latest REQUESTED_DOCS_PKG=tt-metalium \
            sphinx-build docs/source/tt-metalium docs/build/html/tt-metalium \
            --keep-going || true

      - name: Build TT-NN docs
        run: |
          DOCS_VERSION=latest REQUESTED_DOCS_PKG=ttnn \
            sphinx-build docs/source/ttnn docs/build/html/ttnn \
            --keep-going 2>&1 | tail -40 || true
          echo "=== ttnn HTML files built: $(find docs/build/html/ttnn -name '*.html' 2>/dev/null | wc -l) ==="

      - name: Copy root index
        run: cp docs/source/index.html docs/build/html/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build/html

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
