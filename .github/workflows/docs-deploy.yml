name: Docs - Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      TT_METAL_HOME: ${{ github.workspace }}
      PYTHONPATH: ${{ github.workspace }}
      DOCS_VERSION: latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install uv
        run: pip install uv

      - name: Install docs requirements
        run: uv pip install --system -r docs/requirements-docs.txt

      - name: Install ttnn
        run: uv pip install --system ttnn || echo "ttnn installation failed — docs will build without API content"

      - name: Install system dependencies
        run: sudo apt-get install -y doxygen pandoc

      - name: Build Doxygen XML (for C++ API)
        run: |
          cd $TT_METAL_HOME
          doxygen docs/Doxyfile || echo "Doxygen failed — C++ API pages will be skipped"

      - name: Build TT-Metalium docs
        run: |
          mkdir -p docs/build
          DOCS_VERSION=latest REQUESTED_DOCS_PKG=tt-metalium \
            sphinx-build docs/source/tt-metalium docs/build/html/tt-metalium \
            --keep-going || true

      - name: Build TT-NN docs
        run: |
          DOCS_VERSION=latest REQUESTED_DOCS_PKG=ttnn \
            sphinx-build docs/source/ttnn docs/build/html/ttnn \
            --keep-going || true

      - name: Copy root index
        run: |
          cp docs/source/index.html docs/build/html/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build/html

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
