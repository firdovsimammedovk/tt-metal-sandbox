name: Docs - Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sphinx sphinx-rtd-theme myst-parser

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build TT-Metalium docs
        run: |
          DOCS_VERSION=latest sphinx-build \
            docs/source/tt-metalium \
            docs/build/html/tt-metalium \
            --keep-going || true

      - name: Build TT-NN docs
        run: |
          DOCS_VERSION=latest sphinx-build \
            docs/source/ttnn \
            docs/build/html/ttnn \
            --keep-going || true

      - name: Copy root index
        run: |
          mkdir -p docs/build/html
          cp docs/source/index.html docs/build/html/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build/html

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
