name: Docs - Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      TT_METAL_HOME: ${{ github.workspace }}
      PYTHONPATH: ${{ github.workspace }}
      DOCS_VERSION: latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install uv
        run: pip install uv

      - name: Install docs requirements
        run: uv pip install --system -r docs/requirements-docs.txt

      - name: Download latest tt-metal wheel
        id: download-wheel
        run: |
          # Get the latest release info
          LATEST=$(curl -s https://api.github.com/repos/tenstorrent/tt-metal/releases/latest)
          TAG=$(echo "$LATEST" | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
          echo "Latest release: $TAG"

          # Find wheel asset
          WHEEL_URL=$(echo "$LATEST" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assets = data.get('assets', [])
          for a in assets:
              name = a['name']
              if name.endswith('.whl') and 'cp310' in name and 'linux_x86_64' in name:
                  print(a['browser_download_url'])
                  break
          ")

          if [ -n "$WHEEL_URL" ]; then
            echo "Downloading wheel: $WHEEL_URL"
            curl -L -o tt_metal.whl "$WHEEL_URL"
            uv pip install --system tt_metal.whl
            echo "wheel_installed=true" >> $GITHUB_OUTPUT
          else
            echo "No matching wheel found in release assets"
            echo "wheel_installed=false" >> $GITHUB_OUTPUT
          fi

      - name: Build docs
        run: |
          cd docs
          make html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build/html

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
